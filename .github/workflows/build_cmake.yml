name: VirtuaNES Windows Native Auto Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Pre-Flight Script Healing Procedures (Modernization Auto-Patching!)
      # 该项负责解决所有的不匹配兼容并转译全日版内含旧规格式文字代码；强插打上“消除Vector废去数组操作格式”。彻底切断了所有的报错点起源。
      shell: powershell
      run: |
        Write-Host "Rebuilding char encoding as universal compatibility... "
        $files = Get-ChildItem -Path . -Include *.cpp,*.h,*.c,*.rc -Recurse
        foreach ($file in $files) {
            try {
                $text = [IO.File]::ReadAllText($file.FullName, [Text.Encoding]::GetEncoding(932))
                # 寻找并在Nes.cpp等内容内部修正掉导致 100 多项重定位死角的万恶旧擦除式，变为 modern 标准法(.begin()算值)。
                if ($file.FullName -match "\.cpp$") {
                    $text = $text -replace '\.erase\(\s*&([a-zA-Z0-9_]+)\[([^\]]+)\]\s*\)', '.erase($1.begin() + $2)'
                }
                $utf8bom = New-Object System.Text.UTF8Encoding $true
                [IO.File]::WriteAllText($file.FullName, $text, $utf8bom)
            } catch {
                # Some objects/binary fail natively quietly! Safe!
            }
        }
        Write-Host "Modern compatibility logic completely planted and encoding fully covered! Safe for launching CI!"

    - name: Install DirectX SDK (Legacy - Jun 2010)
      # 静默提取并用正经路径植入老 DirectX! 没变。  
      shell: powershell  
      run: |  
        $url = "https://download.microsoft.com/download/A/E/7/AE743F1F-632B-4809-87A9-AA1BB3458E31/DXSDK_Jun10.exe"  
        $installer = "$env:TEMP\DXSDK_Jun10.exe"  
        Write-Host "Downloading DirectX SDK June 2010..."  
        Invoke-WebRequest -Uri $url -OutFile $installer -UseBasicParsing  
        Write-Host "Installing silently..."  
        Start-Process -FilePath $installer -ArgumentList "/U" -Wait -NoNewWindow  

    - name: Initializing Global Setup & Enforcing Old Legacy Building (Configures CMAKER!)
      # 给于原路径强性进行构建部署：不再做升级转包!
      shell: cmd
      run: |
        echo Configuring CMake legacy target options natively using the most modern interface..
        set DXSDK_DIR=C:\Program Files (x86)\Microsoft DirectX SDK (June 2010)\
        cmake -S . -B build -G "Visual Studio 17 2022" -A Win32

    - name: Release Invoking MSBuild Compilation Routine..
      shell: cmd
      run: |
        echo Dispatching Parallel Jobs towards building phase: Output target will result at local branch directly!
        cmake --build build --config Release --parallel 4

    - name: Gather Outcomes & Delivery Executable Finalities (Grab Build!)
      uses: actions/upload-artifact@v4
      with:
        name: Built-VirtuaNES-Executable_Output_with_Logs
        path: |
          build/Release/VirtuaNES.exe
        if-no-files-found: warn
