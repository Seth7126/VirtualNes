name: VirtuaNES Windows Build

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch: # 允许你可以在Github页面手动点击按钮触发运行

jobs:
  build:
    runs-on: windows-2022
    
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4

    - name: Fix Shift-JIS (cp932) to UTF-8 BOM encoding
      # 早期的日本作者多采用 SJIS 编码，新版VS在此编码下遇到全角标点经常引发各种C2001换行报错，此步骤全局纠正
      shell: powershell
      run: |
        Write-Host "Converting sources to UTF-8 to prevent C++ compiler syntax errors..."
        $files = Get-ChildItem -Path . -Include *.cpp,*.h,*.c -Recurse
        foreach ($file in $files) {
            try {
                $text = [IO.File]::ReadAllText($file.FullName, [Text.Encoding]::GetEncoding(932))
                $utf8bom = New-Object System.Text.UTF8Encoding $true
                [IO.File]::WriteAllText($file.FullName, $text, $utf8bom)
            } catch {
                Write-Host "Failed to convert $($file.FullName) (Maybe not text)"
            }
        }
        Write-Host "Conversion completed."

    - name: Install DirectX SDK (Legacy - Jun 2010)  
      shell: powershell  
      run: |  
        $url = "https://download.microsoft.com/download/A/E/7/AE743F1F-632B-4809-87A9-AA1BB3458E31/DXSDK_Jun10.exe"  
        $installer = "$env:TEMP\DXSDK_Jun10.exe"  
        Write-Host "Downloading DirectX SDK June 2010..."  
        Invoke-WebRequest -Uri $url -OutFile $installer -UseBasicParsing  
        Write-Host "Installing silently..."  
        Start-Process -FilePath $installer -ArgumentList "/U" -Wait -NoNewWindow  
        Write-Host "DirectX SDK installation complete."
        - name: Inject _DEBUGOUT to Release config inside .dsp
          # 运用 PowerShell 直接为传统的 VC6 文本配置文件的 "NDEBUG" Release设置注入 /D "_DEBUGOUT" 参数
          shell: powershell
          run: |
            $dspFile = "VirtuaNES.dsp"
            if (Test-Path $dspFile) {
                $content = Get-Content $dspFile
                $newContent = $content -replace '/D "NDEBUG"', '/D "NDEBUG" /D "_DEBUGOUT"'
                Set-Content $dspFile $newContent
                Write-Host "_DEBUGOUT Macro Injected to .dsp"
            } else {
                Write-Error "Cannot find $dspFile !"
                exit 1
            }

    - name: Setup MSBuild & Add Devenv
      uses: microsoft/setup-msbuild@v2

    - name: Upgrade .dsw to .sln (.vcxproj)
      # 运用 VS2022 自动化环境静默将 DSW / DSP 更新成 .sln 与 .vcxproj
      shell: cmd
      run: |
        echo Upgrading old Visual Studio Workspace...
        "C:\Program Files\Microsoft Visual Studio\2022\Enterprise\Common7\IDE\devenv.com" VirtuaNES.dsw /Upgrade
        
    - name: Build Project (Win32 Release)
      shell: cmd
      run: |
        echo Fetching the explicitly installed Legacy DirectX Directory...
        set DXSDK_DIR=C:\Program Files (x86)\Microsoft DirectX SDK (June 2010)\
        
        echo Force Environment Includes for DX...
        set INCLUDE=%DXSDK_DIR%Include;%INCLUDE%
        set LIB=%DXSDK_DIR%Lib\x86;%LIB%
        
        echo Running MSBuild...
        msbuild VirtuaNES.sln /p:Configuration="Release" /p:Platform="Win32" /p:PlatformToolset="v143" /m /v:normal
        
    - name: Collect and Upload Output Binary
      # 将构建生成的带有 DebugOut 能力的文件发送出工作流
      uses: actions/upload-artifact@v4
      with:
        name: VirtuaNES-DebugOut
        path: |
          Release/VirtuaNES.exe
          *.exe
        if-no-files-found: warn
